abstract: "The word \"expert\" in mixture-of-experts is a fossil: a modern expert is a routed feed-forward subnetwork for conditional compute, not something that runs experiments. Taking the older sense seriously, we ask what it would mean for a language model to run an experiment on itself. Recent test-time activation steering does not qualify, because steering pushes the residual stream toward a chosen answer and so presupposes the conclusion. A genuine experiment is answer-agnostic: it intervenes on the evidence a claim depends on, predicts how the output should respond if the claim is grounded, and reads the discrepancy. We make this concrete as a controlled internal experiment, a targeted intervention on the evidence bound to an answer paired with a matched control intervention on evidence that should be irrelevant, whose control-corrected differential measures whether the answer is causally grounded. A mixture of experimenters is a battery of such experiments aggregated into one label-free correctness signal. On an in-context retrieval task with a small transformer whose ground truth is known by construction, in a noisy regime, the aggregated signal separates correct from incorrect answers with AUROC 0.967 (a three-experiment mixture; 0.956 for two), against 0.786 for negative entropy, 0.784 for logit margin, and 0.602 for a supervised correctness probe. The comparison with the probe is one of access, not supervision: each experiment runs three to five counterfactual forward passes and watches the output move, while the probe is a single-pass readout of one frozen activation, so the gap shows that interventional access beats static readout rather than that labels are useless. The construction transfers to Pythia-160M, reaching AUROC 0.841 against 0.719 for entropy. When the model must locate its own evidence by causal attribution rather than being given it, the signal stays above chance but its advantage over confidence disappears, falling to AUROC 0.683 below entropy's 0.719 at the attribution quality a small model supplies. The matched control is necessary where the intervention is non-specific (ablation, AUROC +0.016) and inert where it is intrinsically specific (a counterfactual swap), so a control matters exactly when there is generic perturbation-sensitivity to cancel. The finding is that whether an answer survives counterfactual intervention on its own evidence is a stronger label-free signal of correctness than how confident the model is, provided the evidence can be located."
